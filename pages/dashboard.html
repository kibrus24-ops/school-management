<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | School Management</title>
    <link
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/fonts.css" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body data-page="dashboard">
    <div class="shell">
      <aside class="sidebar" id="sidebar">
        <a href="./dashboard.html" class="brand">YTS SCHOOL</a>
        <nav class="nav" aria-label="Sidebar navigation">
          <a class="nav-link" data-nav="dashboard" href="./dashboard.html"
            >Dashboard</a
          >
          <a class="nav-link" data-nav="students" href="./students.html"
            >Students</a
          >
          <a class="nav-link" data-nav="teachers" href="./teachers.html"
            >Teachers</a
          >
          <a class="nav-link" data-nav="attendance" href="./attendance.html"
            >Attendance</a
          >
          <a class="nav-link" data-nav="results" href="./results.html"
            >Results</a
          >
        </nav>
        <div class="sidebar-footer">
          <p class="note">
            Signed in as <strong data-current-user>Admin</strong>
          </p>
          <button data-logout class="btn btn-secondary" type="button">
            Logout
          </button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <button id="menuToggle" class="btn menu-toggle" type="button">
            Menu
          </button>
          <div class="page-title">
            <h2>Admin Dashboard</h2>
            <p>Overview of your school's latest data.</p>
          </div>
        </header>

        <section
          id="statsGrid"
          class="grid-stats"
          aria-label="Statistics cards"
        ></section>

        <section class="grid-two">
          <article class="card">
            <div class="section-head">
              <h3>Recent Students</h3>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Class</th>
                  </tr>
                </thead>
                <tbody id="recentStudents"></tbody>
              </table>
            </div>
          </article>

          <article class="card">
            <div class="section-head">
              <h3>Teacher Directory</h3>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Subject</th>
                  </tr>
                </thead>
                <tbody id="recentTeachers"></tbody>
              </table>
            </div>
          </article>
        </section>
      </main>
    </div>

    <script type="module" src="../js/app.js"></script>
  </body>
</html>
