<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard | School Management</title>
    <link
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/fonts.css" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body data-page="student">
    <div class="shell">
      <aside class="sidebar" id="sidebar">
        <a href="./student.html" class="brand">YTS SCHOOL</a>
        <nav class="nav" aria-label="Sidebar navigation">
          <a class="nav-link" data-nav="student" href="./student.html"
            >Student Dashboard</a
          >
        </nav>
        <div class="sidebar-footer">
          <p class="note">
            Signed in as <strong data-current-user>Student</strong>
          </p>
          <button data-logout class="btn btn-secondary" type="button">
            Logout
          </button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <button id="menuToggle" class="btn menu-toggle" type="button">
            Menu
          </button>
          <div class="page-title">
            <h2 id="studentWelcome">Student Dashboard</h2>
            <p>Track your attendance and grades in one place.</p>
          </div>
        </header>

        <section id="studentStats" class="grid-stats"></section>

        <section class="grid-two">
          <article class="card">
            <div class="section-head">
              <h3>My Attendance</h3>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="studentAttendanceBody"></tbody>
              </table>
            </div>
          </article>

          <article class="card">
            <div class="section-head">
              <h3>My Grades</h3>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Subject</th>
                    <th>Score</th>
                    <th>Grade</th>
                  </tr>
                </thead>
                <tbody id="studentResultsBody"></tbody>
              </table>
            </div>
          </article>
        </section>
      </main>
    </div>

    <script type="module" src="../js/app.js"></script>
  </body>
</html>
