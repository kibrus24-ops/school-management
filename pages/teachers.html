<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teachers | School Management</title>
    <link
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/fonts.css" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body data-page="teachers">
    <div class="shell">
      <aside class="sidebar" id="sidebar">
        <a href="./dashboard.html" class="brand">YTS SCHOOL</a>
        <nav class="nav" aria-label="Sidebar navigation">
          <a class="nav-link" data-nav="dashboard" href="./dashboard.html"
            >Dashboard</a
          >
          <a class="nav-link" data-nav="students" href="./students.html"
            >Students</a
          >
          <a class="nav-link" data-nav="teachers" href="./teachers.html"
            >Teachers</a
          >
          <a class="nav-link" data-nav="attendance" href="./attendance.html"
            >Attendance</a
          >
          <a class="nav-link" data-nav="results" href="./results.html"
            >Results</a
          >
        </nav>
        <div class="sidebar-footer">
          <p class="note">
            Signed in as <strong data-current-user>Admin</strong>
          </p>
          <button data-logout class="btn btn-secondary" type="button">
            Logout
          </button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <button id="menuToggle" class="btn menu-toggle" type="button">
            Menu
          </button>
          <div class="page-title">
            <h2>Teacher Management</h2>
            <p>Maintain teacher profiles and subject assignments.</p>
          </div>
        </header>

        <section class="grid-two">
          <article class="card">
            <div class="section-head">
              <h3>Teacher Form</h3>
            </div>
            <form id="teacherForm" novalidate>
              <input id="teacherId" type="hidden" />
              <div class="form-grid">
                <div class="form-group full">
                  <label for="teacherName">Full Name</label>
                  <input id="teacherName" class="input" type="text" required />
                </div>
                <div class="form-group full">
                  <label for="teacherEmail">Email</label>
                  <input
                    id="teacherEmail"
                    class="input"
                    type="email"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="teacherSubject">Subject</label>
                  <input
                    id="teacherSubject"
                    class="input"
                    type="text"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="teacherPhone">Phone</label>
                  <input id="teacherPhone" class="input" type="text" required />
                </div>
              </div>
              <p id="teacherMsg" class="text-error" aria-live="polite"></p>
              <div class="actions">
                <button class="btn btn-primary" type="submit">
                  Save Teacher
                </button>
                <button
                  id="teacherReset"
                  class="btn btn-secondary"
                  type="button"
                >
                  Reset
                </button>
              </div>
            </form>
          </article>

          <article class="card">
            <div class="section-head">
              <h3>Teachers List</h3>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Subject</th>
                    <th>Phone</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="teachersTableBody"></tbody>
              </table>
            </div>
          </article>
        </section>
      </main>
    </div>

    <script type="module" src="../js/app.js"></script>
  </body>
</html>
